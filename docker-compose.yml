services:

  # ── Base de datos ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: che-rembiu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: che_rembiu
      POSTGRES_USER: cheuser
      POSTGRES_PASSWORD: chepass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    networks:
      - che-rembiu-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cheuser -d che_rembiu"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Micro-servicio: recetas ──────────────────────────────
  recipes-service:
    build:
      context: ./services/recipes-service
    container_name: che-rembiu-recipes-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: che_rembiu
      POSTGRES_USER: cheuser
      POSTGRES_PASSWORD: chepass
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - che-rembiu-net

  # ── Micro-servicio: búsqueda ─────────────────────────────
  search-service:
    build:
      context: .
      dockerfile: services/search-service/Dockerfile
    container_name: che-rembiu-search-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: che_rembiu
      POSTGRES_USER: cheuser
      POSTGRES_PASSWORD: chepass
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - che-rembiu-net

  # ── Micro-servicio: historial ────────────────────────────
  history-service:
    build:
      context: ./services/history-service
    container_name: che-rembiu-history-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: che_rembiu
      POSTGRES_USER: cheuser
      POSTGRES_PASSWORD: chepass
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - che-rembiu-net

# ── Volúmenes ────────────────────────────────────────────────
volumes:
  postgres-data:

# ── Red interna ──────────────────────────────────────────────
networks:
  che-rembiu-net:
    driver: bridge
